databases:
  - name: cartographie-si-db
    plan: free
    databaseName: cartographie_si
    user: cartographie_si_user

services:
  - type: web
    name: cartographie-si-airalgerie
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate && python manage.py loaddata initial_data 2>/dev/null; python manage.py shell -c \"from django.contrib.auth.models import User; User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin','admin@airalgerie.dz','AirAlgerie2026!')\" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: DATABASE_URL
        fromDatabase:
          name: cartographie-si-db
          property: connectionString
