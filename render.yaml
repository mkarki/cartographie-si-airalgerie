databases:
  - name: cartographie-si-db
    plan: free
    databaseName: cartographie_si
    user: cartographie_si_user

services:
  - type: web
    name: cartographie-si-airalgerie
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --timeout 120 --workers 2"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.10.12"
      - key: DATABASE_URL
        fromDatabase:
          name: cartographie-si-db
          property: connectionString
